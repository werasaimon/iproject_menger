<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧠 brain</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--fg:#e6edf3;--mut:#8b949e;--accent:#58a6ff;--del:#f85149}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:13px system-ui,sans-serif}
  #cy{position:absolute;inset:0;bottom:0}
  #legend{position:absolute;top:8px;left:8px;z-index:5;background:rgba(22,27,34,.9);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:11.5px}
  #legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
  #legend .row{margin:2px 0}
  #info{position:absolute;right:8px;top:8px;z-index:5;max-width:300px;background:rgba(22,27,34,.95);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px;display:none}
  #info .ttl{font-weight:700;margin-bottom:4px} #info .why{color:#ff7b72}
</style></head>
<body>
<div id="cy"></div>
<div id="legend">
  <div class="row"><i style="background:#58a6ff"></i>state</div>
  <div class="row"><i style="background:#bc8cff"></i>judgment</div>
  <div class="row"><i style="background:#3fb950"></i>fact</div>
  <div class="row"><i style="background:#d29922"></i>action</div>
  <div class="row"><i style="background:#f85149"></i>forbidden</div>
  <div class="row" style="margin-top:5px;color:var(--mut)">— рёбра: серое=возможно · <span style="color:#f85149">красный пунктир=невозможно</span></div>
</div>
<div id="info"></div>
<script>
const P=new URLSearchParams(location.search).get("p")||"";
const KC={state:"#1f6feb",judgment:"#7b50c0",fact:"#1f7a33",action:"#9a6f14",forbidden:"#7a2420"};
const KB={state:"#58a6ff",judgment:"#bc8cff",fact:"#3fb950",action:"#d29922",forbidden:"#f85149"};
fetch("/api/brain?p="+encodeURIComponent(P),{cache:"no-store"}).then(r=>r.json()).then(g=>{
  const els=[];
  (g.nodes||[]).forEach(n=>els.push({data:{id:n.id,label:n.label||n.id,kind:n.kind||"fact",evidence:n.evidence||""}}));
  (g.edges||[]).forEach((e,i)=>els.push({data:{id:"e"+i,source:e.from,target:e.to,rel:e.rel||"",ok:e.ok!==false,why:e.why||""}}));
  const cy=cytoscape({container:document.getElementById("cy"),elements:els,
    style:[
      {selector:"node",style:{"label":"data(label)","color":"#e6edf3","font-size":"11px","text-wrap":"wrap","text-max-width":"150px",
        "background-color":ele=>KC[ele.data("kind")]||"#222","border-width":2,"border-color":ele=>KB[ele.data("kind")]||"#888",
        "shape":ele=>ele.data("kind")==="forbidden"?"round-diamond":(ele.data("kind")==="action"?"round-tag":"round-rectangle"),
        "padding":"8px","text-valign":"center","width":"label","height":"label"}},
      {selector:"edge",style:{"label":"data(rel)","font-size":"9px","color":"#9aa4af","curve-style":"bezier",
        "target-arrow-shape":"triangle","width":2,"line-color":"#8b949e","target-arrow-color":"#8b949e","text-rotation":"autorotate","text-background-color":"#0d1117","text-background-opacity":1,"text-background-padding":"2px"}},
      {selector:"edge[!ok]",style:{"line-color":"#f85149","target-arrow-color":"#f85149","line-style":"dashed","width":3,"color":"#ff7b72","target-arrow-shape":"tee"}}
    ],
    layout:{name:"cose",animate:false,padding:30,nodeRepulsion:9000,idealEdgeLength:120}});
  const info=document.getElementById("info");
  function show(t,sub,why){info.style.display="block";info.innerHTML="<div class='ttl'>"+t+"</div>"+(sub?"<div>"+sub+"</div>":"")+(why?"<div class='why'>✗ "+why+"</div>":"");}
  cy.on("tap","node",e=>show(e.target.data("label"),e.target.data("kind")+(e.target.data("evidence")?" · "+e.target.data("evidence"):""),""));
  cy.on("tap","edge",e=>show((e.target.data("ok")?"":"НЕВОЗМОЖНО · ")+e.target.data("rel"),e.target.data("source")+" → "+e.target.data("target"),e.target.data("ok")?"":e.target.data("why")));
  cy.on("tap",e=>{ if(e.target===cy) info.style.display="none"; });
});
</script>
</body></html>
