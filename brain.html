<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧠 brain</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--fg:#e6edf3;--mut:#8b949e;--accent:#58a6ff}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:13px system-ui,sans-serif}
  #wrap{display:flex;height:100vh}
  #sidebar{width:160px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  #sidebar h3{margin:0;padding:10px 12px 6px;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line)}
  #glist{overflow-y:auto;flex:1}
  .gi{padding:8px 12px;cursor:pointer;font-size:12.5px;border-left:3px solid transparent;transition:.1s}
  .gi:hover{background:#1c2330} .gi.on{border-left-color:var(--accent);background:#10243d;color:var(--accent);font-weight:700}
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #toolbar{display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap;align-items:center}
  #toolbar button{background:#1f2630;color:#cfe5ff;border:1px solid var(--line);border-radius:14px;padding:3px 11px;font-size:12px;cursor:pointer}
  #toolbar button:hover,#toolbar button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
  #gtitle{font-size:13px;font-weight:700;color:var(--fg);margin-right:4px}
  #cybox{flex:1;min-height:0;position:relative}
  #cy{position:absolute;inset:0}
  #legend{position:absolute;top:6px;left:6px;z-index:5;background:rgba(22,27,34,.92);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:11px;max-width:44%}
  #legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}
  #legend .grp{margin-top:4px;color:var(--mut)} #legend span{margin-right:7px;white-space:nowrap}
  #info{position:absolute;top:6px;right:6px;z-index:5;max-width:320px;background:rgba(22,27,34,.96);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:12.5px;display:none;word-break:break-word}
  #info .ttl{font-weight:700;margin-bottom:4px} #info .why{color:#ff7b72;margin-top:4px}
  #conn{padding:8px 10px;overflow:auto;max-height:28vh;border-top:1px solid var(--line)}
  #conn h3{margin:4px 0 6px;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
  table{border-collapse:collapse;width:100%;font-size:12px}
  td,th{border:1px solid var(--line);padding:3px 7px;text-align:left;vertical-align:top} th{background:#1c2330}
  tr.imp td{background:rgba(248,81,73,.07)} .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
</style></head>
<body>
<div id="wrap">
  <div id="sidebar">
    <h3>🧠 Графы</h3>
    <div id="glist"><span style="color:var(--mut);padding:10px;display:block;font-size:12px">загрузка…</span></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span id="gtitle"></span>
      <button id="btn-tb" class="on" onclick="relayout('TB')">↓ TB</button>
      <button id="btn-lr" onclick="relayout('LR')">→ LR</button>
      <button onclick="window.cy&&window.cy.fit(null,40)">⊡ fit</button>
    </div>
    <div id="cybox">
      <div id="cy"></div>
      <div id="legend">
        <div><b>узлы:</b>
          <span><i style="background:#58a6ff"></i>state</span><span><i style="background:#bc8cff"></i>judgment</span>
          <span><i style="background:#3fb950"></i>fact</span><span><i style="background:#d29922"></i>action</span><span><i style="background:#f85149"></i>forbidden</span></div>
        <div class="grp"><b>рёбра:</b>
          <span><i style="background:#3fb950"></i>supports</span><span><i style="background:#58a6ff"></i>→ requires</span>
          <span><i style="background:#f85149"></i>✗ невозможно (пунктир)</span></div>
      </div>
      <div id="info"></div>
    </div>
    <div id="conn"></div>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search).get("p")||"";
let G="";
const esc=s=>(''+s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const KC={state:"#1f6feb",judgment:"#7b50c0",fact:"#1f7a33",action:"#9a6f14",forbidden:"#7a2420"};
const KB={state:"#58a6ff",judgment:"#bc8cff",fact:"#3fb950",action:"#d29922",forbidden:"#f85149"};
function relColor(rel,ok){
  if(ok===false) return "#f85149";
  const r=(''+rel).toLowerCase();
  if(/support|characteris/.test(r)) return "#3fb950";
  if(/contradict/.test(r)) return "#f85149";
  if(/refine/.test(r)) return "#bc8cff";
  if(/defeasib|⤳/.test(r)) return "#39c5cf";
  if(/resolv/.test(r)) return "#d29922";
  if(/impl|requir|embed|\+/.test(r)) return "#58a6ff";
  return "#8b949e";
}

function selectGraph(g){
  G=g;
  document.getElementById("gtitle").textContent=g;
  document.querySelectorAll(".gi").forEach(el=>el.classList.toggle("on", el.dataset.g===g));
  renderGraph();
}

function renderGraph(){
  fetch("/api/brain?p="+encodeURIComponent(P)+"&g="+encodeURIComponent(G),{cache:"no-store"})
  .then(r=>r.json()).then(data=>{
    const nodes=data.nodes||[], edges=data.edges||[];
    const lbl={}; nodes.forEach(n=>lbl[n.id]=n.label||n.id);
    const els=[];
    nodes.forEach(n=>els.push({data:{id:n.id,label:n.label||n.id,kind:n.kind||"fact",evidence:n.evidence||""}}));
    edges.forEach((e,i)=>els.push({data:{id:"e"+i,source:e.from,target:e.to,rel:e.rel||"",ok:e.ok!==false,why:e.why||""}}));
    try{ if(window.cy){ window.cy.destroy(); window.cy=null; } }catch(_){}
    window.cy=cytoscape({container:document.getElementById("cy"),elements:els,
      style:[
        {selector:"node",style:{"label":"data(label)","color":"#e6edf3","font-size":"11px","text-wrap":"wrap","text-max-width":"140px",
          "background-color":ele=>KC[ele.data("kind")]||"#222","border-width":2,"border-color":ele=>KB[ele.data("kind")]||"#888",
          "shape":ele=>ele.data("kind")==="forbidden"?"round-diamond":(ele.data("kind")==="action"?"round-tag":"round-rectangle"),
          "padding":"8px","text-valign":"center","width":"label","height":"label"}},
        {selector:"edge",style:{"label":"data(rel)","font-size":"9px","color":ele=>relColor(ele.data("rel"),ele.data("ok")),
          "curve-style":"bezier",
          "target-arrow-shape":"triangle","width":2.5,
          "line-color":ele=>relColor(ele.data("rel"),ele.data("ok")),
          "target-arrow-color":ele=>relColor(ele.data("rel"),ele.data("ok")),
          "text-rotation":"autorotate","text-background-color":"#0d1117","text-background-opacity":1,"text-background-padding":"2px"}},
        {selector:"edge[!ok]",style:{"line-style":"dashed","width":3,"target-arrow-shape":"tee"}}
      ],
      layout:{name:"dagre",animate:false,padding:40,rankDir:"TB",nodeSep:60,rankSep:80}})
    .on("tap","node",e=>showNode(e.target.data("label"),e.target.data("kind"),e.target.data("evidence")||"",e.target.data("file")||"",e.target.id()))
    .on("tap","edge",e=>show((e.target.data("ok")?"":"НЕВОЗМОЖНО · ")+e.target.data("rel"),lbl[e.target.data("source")]+" → "+lbl[e.target.data("target")],e.target.data("ok")?"":e.target.data("why")))
    .on("tap",function(e){if(e.target===this) document.getElementById("info").style.display="none";});
    // connections table
    document.getElementById("conn").innerHTML="<h3>связи ("+edges.length+")</h3><table>"
      +"<tr><th>от</th><th>связь</th><th>к</th><th>?</th><th>почему</th></tr>"
      +edges.map(e=>{const c=relColor(e.rel,e.ok!==false);
        return `<tr class="${e.ok===false?'imp':''}"><td>${esc(lbl[e.from]||e.from)}</td>`
          +`<td><span class="dot" style="background:${c}"></span>${esc(e.rel||'')}</td>`
          +`<td>${esc(lbl[e.to]||e.to)}</td><td>${e.ok===false?'<b style="color:#f85149">✗</b>':'✓'}</td>`
          +`<td>${esc(e.why||'')}</td></tr>`;}).join("")+"</table>";
  }).catch(err=>{document.getElementById("conn").innerHTML="<p style='color:#f85149;padding:10px'>ошибка: "+(err&&err.message?err.message:String(err))+"</p>";});
}

function relayout(dir){
  if(!window.cy) return;
  document.getElementById("btn-tb").classList.toggle("on",dir==="TB");
  document.getElementById("btn-lr").classList.toggle("on",dir==="LR");
  window.cy.layout({name:"dagre",animate:true,animationDuration:300,padding:40,rankDir:dir,nodeSep:60,rankSep:80}).run();
}
function show(t,sub,why){const info=document.getElementById("info");info.style.display="block";
  info.innerHTML="<div class='ttl'>"+esc(t)+"</div>"+(sub?"<div>"+esc(sub)+"</div>":"")+(why?"<div class='why'>✗ "+esc(why)+"</div>":"");}

function jumpFile(path,line){window.parent.postMessage({cmd:"openFile",path:path,line:line},"*");}

function symbolFrom(label){
  // take only the part before · or newline (the "key" token)
  const key = label.split(/\s*[·•\n]\s*/)[0].trim();
  const src = key || label;
  // snake_case with optional uppercase start: H_raw, disparity_std_px, load_from_file
  const snake=(src.match(/[a-zA-Z][a-zA-Z0-9]*(?:_[a-zA-Z0-9]+)+/g)||[]).sort((a,b)=>b.length-a.length);
  if(snake.length) return snake[0];
  // CamelCase — must have lowercase after first capital (skip ALL_CAPS)
  const camel=(src.match(/[A-Z][a-z][a-zA-Z0-9]{2,}/g)||[]).sort((a,b)=>b.length-a.length);
  if(camel.length) return camel[0];
  // fallback: longest lowercase ASCII word ≥5 chars in key part only
  const w=(key.match(/[a-z]{5,}/g)||[]).sort((a,b)=>b.length-a.length);
  return w.length?w[0]:"";
}

async function showNode(label,kind,evidence,file,nodeId){
  show(label, kind+(evidence?" · "+evidence:""), "");
  const info=document.getElementById("info");
  info.innerHTML+="<div id='filinks' style='margin-top:6px;font-size:11px;color:var(--mut)'>🔎 ищу файл…</div>";
  try{
    let hits=[];
    if(file && file.includes("/")){
      hits=[{file:file,line:1,snippet:"",exact:true}];
    } else {
      // use symbolFrom; if empty fall back to node id
      const sym=symbolFrom(label)||(nodeId||"").replace(/^s_/,"");
      if(!sym){ document.getElementById("filinks").textContent="концептуальный узел"; return; }
      const r=await fetch("/api/find?p="+encodeURIComponent(P)+"&q="+encodeURIComponent(sym),{cache:"no-store"});
      if(!r.ok) throw new Error("HTTP "+r.status);
      hits=await r.json();
      // if primary sym found nothing and sym≠nodeId, retry with nodeId
      if((!hits||!hits.length) && nodeId && nodeId !== sym){
        const r2=await fetch("/api/find?p="+encodeURIComponent(P)+"&q="+encodeURIComponent(nodeId),{cache:"no-store"});
        if(r2.ok) hits=await r2.json();
      }
    }
    const fl=document.getElementById("filinks");
    if(!fl) return;
    if(!hits||!hits.length){ fl.textContent="файл не найден (концептуальный узел)"; return; }
    fl.innerHTML="<div style='margin-bottom:3px;color:var(--mut)'>→ файлы:</div>"
      +hits.map(h=>`<div style='margin:2px 0'><a href='#' style='color:var(--accent);font-size:11px;font-family:ui-monospace,monospace'
        onclick='event.preventDefault();jumpFile(${JSON.stringify(h.file)},${h.line})'>${esc(h.file)}:${h.line}</a>
        <span style='color:var(--mut);font-size:10px;margin-left:4px'>${esc((h.snippet||"").slice(0,50))}</span></div>`).join("");
  }catch(e){ const fl=document.getElementById("filinks"); if(fl) fl.textContent="⚠ "+e.message; }
}

// load graph list first, then render first graph
fetch("/api/brain/list?p="+encodeURIComponent(P),{cache:"no-store"})
.then(r=>r.json()).then(list=>{
  const gl=document.getElementById("glist");
  if(!list.length){gl.innerHTML="<span style='color:var(--mut);padding:10px;display:block'>нет графов</span>";return;}
  gl.innerHTML=list.map(g=>`<div class="gi" data-g="${g}" onclick="selectGraph('${g}')">${g}</div>`).join("");
  selectGraph(list[0]);
});
</script>
</body></html>
